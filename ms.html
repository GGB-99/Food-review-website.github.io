<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美食猜猜乐 - 美味百科</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/game.css">
</head>
<body>

<!-- 导航栏 -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">
        <a class="navbar-brand" href="#">美味百科</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" href="index.html">返回首页</a></li>
            </ul>
        </div>
    </div>
</nav>

<main>
    <!-- 顶部 -->
    <div class="game-hero">
        <div class="container">
            <h1>美食猜猜乐</h1>
            <p>根据提示猜出美食名称，看看你能答对多少题！</p>
        </div>
    </div>

    <!-- 统计条 -->
    <div class="container">
        <div class="stat-bar">
            <div class="stat-item stat-correct">
                <div class="stat-value" id="statCorrect">0</div>
                <div class="stat-label">答对</div>
            </div>
            <div class="stat-item stat-wrong">
                <div class="stat-value" id="statWrong">0</div>
                <div class="stat-label">答错</div>
            </div>
            <div class="stat-item stat-total">
                <div class="stat-value" id="statTotal">0</div>
                <div class="stat-label">已答</div>
            </div>
            <div class="stat-item stat-streak">
                <div class="stat-value" id="statStreak">0</div>
                <div class="stat-label">连对</div>
            </div>
        </div>
    </div>

    <!-- 游戏卡片 -->
    <div class="container">
        <div class="game-card">
            <div class="game-card-header">
                <div class="question-num" id="questionNum">第 1 题 / 共 100 题</div>
                <p class="question-tip" id="tip">提示：正在加载...</p>
            </div>
            <div class="progress-track">
                <div class="progress-bar-inner" id="progressBar" style="width:0%"></div>
            </div>
            <div class="game-card-body">
                <input type="text" class="answer-input" id="answerInput"
                       placeholder="输入美食名称" autocomplete="off">
                <div class="btn-row">
                    <button class="btn-game btn-submit" id="btnSubmit">提交答案</button>
                    <button class="btn-game btn-hint" id="btnHint">提示一下</button>
                    <button class="btn-game btn-next" id="btnNext">下一题</button>
                </div>
                <div class="feedback" id="feedback"></div>
                <div class="hint-text" id="hintText"></div>
            </div>
        </div>
    </div>

    <!-- 答题历史 -->
    <div class="container">
        <div class="history-section">
            <h3 class="history-title">答题记录</h3>
            <ul class="history-list" id="historyList">
                <li style="justify-content:center;color:#bbb;">暂无记录，开始答题吧</li>
            </ul>
        </div>
    </div>
</main>

<!-- 完成弹窗 -->
<div class="finish-overlay" id="finishOverlay">
    <div class="finish-box">
        <div class="finish-emoji" id="finishEmoji">🎉</div>
        <h2 id="finishTitle">全部答完啦！</h2>
        <div class="finish-score" id="finishScore">0 / 0</div>
        <p class="finish-msg" id="finishMsg">正确率 0%</p>
        <button class="btn-game btn-restart" id="btnRestart">重新开始</button>
    </div>
</div>

<!-- 页脚 -->
<footer>
    <div class="container">
        <p>美味百科 &copy; IVT &middot; 二组网页 &middot; 刘佳喻 周华</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
(function () {
    'use strict';

    var foodList = [
        ['四川名菜，麻辣鲜香','麻婆豆腐'],
        ['京城招牌，皮脆肉嫩','北京烤鸭'],
        ['鲁菜经典，酸甜口味','糖醋鲤鱼'],
        ['广东特色，蜜汁烤肉','广式叉烧'],
        ['陕西小吃，馍夹卤肉','肉夹馍'],
        ['春节必备，面皮裹馅','饺子'],
        ['江浙名点，小笼汤汁','小笼包'],
        ['湘菜代表，辣味十足','剁椒鱼头'],
        ['上海经典，浓油赤酱','红烧肉'],
        ['云南特色，米线搭配','过桥米线']
    ];

    var $tip = document.getElementById('tip');
    var $num = document.getElementById('questionNum');
    var $input = document.getElementById('answerInput');
    var $btnSubmit = document.getElementById('btnSubmit');
    var $btnNext = document.getElementById('btnNext');

    var queue = [];
    var current = 0;

    function shuffle(arr) {
        var a = arr.slice();
        for (var i = a.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var t = a[i]; a[i] = a[j]; a[j] = t;
        }
        return a;
    }

    function initGame() {
        queue = shuffle(foodList);
        current = 0;
        loadQuestion();
    }

    function loadQuestion() {
        if (current >= queue.length) return;
        var q = queue[current];
        $tip.textContent = '提示：' + q[0];
        $num.textContent = '第 ' + (current + 1) + ' 题 / 共 ' + queue.length + ' 题';
        $input.value = '';
    }

    function nextQuestion() {
        current++;
        loadQuestion();
    }

    $btnNext.addEventListener('click', nextQuestion);
    initGame();
})();
</script>

</body>
</html>
